<?xml version="1.0" encoding="UTF-8"?>
<!--
  meme.svg — an ORIGINAL, hand-drawn meme for the hero.
  Self-contained vector (no external assets, no copyright issues, scales crisp
  on any screen). Classic Impact-style top/bottom caption over a smug soccer
  ball mascot. All good-natured banter. ⚽😎
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" role="img"
     aria-label="Meme: a smug soccer ball holding up a number one foam finger. Top text: 'BEATS GERMANY ONCE'. Bottom text: 'TALKS ABOUT IT FOREVER'.">

  <defs>
    <!-- Sky / stadium backdrop -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0072ce"/>
      <stop offset="100%" stop-color="#7ec0ff"/>
    </linearGradient>
    <!-- Pitch -->
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fa34d"/>
      <stop offset="100%" stop-color="#2c7a3a"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9e9ef"/>
    </radialGradient>
  </defs>

  <!-- Background scene -->
  <rect width="600" height="520" fill="url(#sky)"/>
  <rect y="360" width="600" height="160" fill="url(#pitch)"/>
  <!-- A couple of pitch mowing stripes for flavor -->
  <rect y="360" width="600" height="160" fill="#ffffff" opacity="0.05"/>
  <ellipse cx="300" cy="500" rx="170" ry="26" fill="#000000" opacity="0.18"/>

  <!-- ===== Smug soccer-ball mascot ===== -->
  <g>
    <!-- Ball body -->
    <circle cx="300" cy="285" r="120" fill="url(#shine)" stroke="#1a1a2e" stroke-width="6"/>

    <!-- Classic black pentagon patches -->
    <polygon points="300,238 332,261 320,298 280,298 268,261"
             fill="#1a1a2e"/>
    <polygon points="300,165 322,182 314,205 286,205 278,182" fill="#1a1a2e"/>
    <polygon points="210,300 232,288 250,308 238,330 214,326" fill="#1a1a2e"/>
    <polygon points="390,300 368,288 350,308 362,330 386,326" fill="#1a1a2e"/>
    <polygon points="262,370 300,356 338,370 326,392 274,392" fill="#1a1a2e"/>

    <!-- Seams connecting the patches -->
    <g stroke="#1a1a2e" stroke-width="4" fill="none" opacity="0.85">
      <line x1="300" y1="205" x2="300" y2="238"/>
      <line x1="268" y1="261" x2="238" y2="288"/>
      <line x1="332" y1="261" x2="362" y2="288"/>
      <line x1="280" y1="298" x2="274" y2="356"/>
      <line x1="320" y1="298" x2="326" y2="356"/>
    </g>

    <!-- Cool sunglasses (the smug) -->
    <g>
      <rect x="238" y="252" width="55" height="30" rx="8" fill="#1a1a2e"/>
      <rect x="307" y="252" width="55" height="30" rx="8" fill="#1a1a2e"/>
      <rect x="293" y="262" width="14" height="6" fill="#1a1a2e"/>
      <!-- glints -->
      <rect x="246" y="258" width="16" height="6" rx="3" fill="#ffffff" opacity="0.6"/>
      <rect x="315" y="258" width="16" height="6" rx="3" fill="#ffffff" opacity="0.6"/>
    </g>

    <!-- Smug little smirk -->
    <path d="M270 320 Q300 345 332 318" stroke="#1a1a2e" stroke-width="6"
          fill="none" stroke-linecap="round"/>
  </g>

  <!-- ===== Foam "#1" finger held up ===== -->
  <g transform="rotate(14 430 190)">
    <rect x="404" y="150" width="52" height="110" rx="20" fill="#ffdd00"
          stroke="#1a1a2e" stroke-width="5"/>
    <text x="430" y="222" font-family="Impact, 'Arial Black', sans-serif"
          font-size="58" fill="#ef3340" text-anchor="middle">1</text>
  </g>

  <!-- ===== Meme captions (Impact, white with black outline) ===== -->
  <g font-family="Impact, 'Arial Black', Haettenschweiler, sans-serif"
     fill="#ffffff" stroke="#1a1a2e" stroke-width="5"
     paint-order="stroke" text-anchor="middle" letter-spacing="1">
    <text x="300" y="62" font-size="52">BEATS GERMANY ONCE</text>
    <text x="300" y="498" font-size="52">TALKS ABOUT IT FOREVER</text>
  </g>
</svg>
